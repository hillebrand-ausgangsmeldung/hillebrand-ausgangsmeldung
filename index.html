<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ausgangsmeldung</title>
<style>
  *{box-sizing:border-box}
  body{font-family:Verdana,Arial,sans-serif;color:#000;margin:0;background:#f0f4f8;padding:16px}
  .card{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.10);padding:20px;max-width:520px;margin:0 auto}
  h1{font-size:1.25em;margin:0 0 4px}
  .sub{color:#666;font-size:.85em;margin-bottom:16px}
  table.info{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:.95em}
  table.info td{padding:5px 4px;border-bottom:1px solid #eee;vertical-align:top}
  table.info td.lbl{width:38%;color:#555;font-weight:bold}
  .weights{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
  .weights div{background:#f5f5f5;border-radius:6px;padding:8px;text-align:center}
  .weights .val{font-size:1.2em;font-weight:bold}
  .weights .lbl{font-size:.75em;color:#777}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:.8em;font-weight:bold;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
  .field input[type=text],.field input[type=date]{width:100%;border:1.5px solid #ddd;border-radius:7px;padding:10px 11px;font-size:1em;font-family:Verdana,Arial,sans-serif}
  .radiorow{display:flex;gap:20px;font-size:1em}
  .radiorow label{display:flex;align-items:center;gap:5px;font-weight:normal;text-transform:none}
  .sigcanvas{border:1.5px solid #ddd;border-radius:7px;width:100%;height:140px;touch-action:none;background:#fff;display:block}
  .sigclear{margin-top:6px;font-size:.85em;padding:7px 14px;border:1px solid #999;border-radius:6px;background:#fff}
  button.primary{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:14px;font-size:1em;width:100%;margin-top:10px;cursor:pointer}
  .error{background:#c0392b;color:#fff;padding:8px 12px;border-radius:6px;font-size:.85em;margin-top:10px;display:none}
  .done{color:#2e7d32;font-size:.85em;margin-top:10px;display:none}
  .missing{background:#c0392b;color:#fff;padding:16px;border-radius:8px;max-width:520px;margin:40px auto;font-size:.95em}

  /* Originales Ausgangsmeldung Formular FO-07-06, nur fuer den Druck */
  #printLayout{display:none}
  .ag-page{width:210mm;min-height:297mm;padding:15mm;margin:0 auto;background:#fff}
  .ag-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12mm}
  .ag-qm{font-size:13pt;line-height:1.6}
  .ag-formular{font-size:11pt;display:inline-block;border-top:1px solid #000;padding-top:1mm;margin-top:1mm}
  .ag-logo{width:66mm;display:block;margin-left:auto}
  .ag-info{width:100%;margin-bottom:8mm;font-size:14pt;border-collapse:collapse}
  .ag-info td{padding:3mm 3mm;vertical-align:top;color:#000}
  .ag-lbl{width:38mm}
  .ag-bold{font-weight:bold}
  .ag-weights{width:100%;border-collapse:collapse;margin-bottom:12mm;font-size:13pt}
  .ag-weights td{border:1px solid #000;padding:3mm 4mm;color:#000}
  .ag-num{text-align:right}
  .ag-fields div{margin-bottom:9mm;font-size:13pt;color:#000}
  .ag-signimg{display:block;height:20mm;margin-top:2mm}
  .ag-signline{display:inline-block;width:50mm;border-bottom:1px solid #000;margin-left:2mm}
  .ag-footbox{border:1px solid #000;display:flex;justify-content:space-between;padding:2mm 4mm;font-size:9pt;color:#000;margin-top:12mm}

  @media screen{
    #printLayout{display:none}
  }
  @media print{
    body{background:#fff;padding:0}
    .no-print{display:none!important}
    #onScreen{display:none!important}
    #printLayout{display:block}
    @page{size:A4;margin:0}
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="printLayout"></div>

function b64ToJson(b64){
  return JSON.parse(decodeURIComponent(escape(atob(b64))));
}
function escHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDE(n){return Number(n).toLocaleString('de-DE');}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isoToDE(iso){
  if(!iso)return '';
  const p=iso.split('-');
  if(p.length!==3)return iso;
  return p[2]+'.'+p[1]+'.'+p[0];
}

const params=new URLSearchParams(location.search);
const raw=params.get('d');
const root=document.getElementById('root');

if(!raw){
  root.innerHTML='<div class="missing">Kein Auftrag gefunden. Dieser Link braucht Auftragsdaten im Link selbst. Bitte den QR-Code auf dem Kommissionierschein erneut scannen.</div>';
}else{
  let data;
  try{ data=b64ToJson(raw); }
  catch(e){ root.innerHTML='<div class="missing">Link ist beschaedigt oder unvollstaendig. Bitte den QR-Code erneut scannen.</div>'; data=null; }

  if(data){
    const sortedCharges=[...(data.c||[])].sort((a,b)=>{
      const na=parseFloat(a),nb=parseFloat(b);
      if(!isNaN(na)&&!isNaN(nb))return na-nb;
      return String(a).localeCompare(String(b));
    });
    const chargeLines=sortedCharges.map(c=>escHtml(c)).join(', ');
    root.innerHTML=`
    <div class="card" id="onScreen">
      <h1>Ausgangsmeldung</h1>
      <div class="sub">Franz Hillebrand KG &ndash; digital ausfuellen und signieren</div>
      <table class="info">
        <tr><td class="lbl">Kunde</td><td>${escHtml(data.k||'')}</td></tr>
        <tr><td class="lbl">Material</td><td>${escHtml(data.m||'')}</td></tr>
        <tr><td class="lbl">Lieferschein-Nr.</td><td>${escHtml(data.l||'')}</td></tr>
        <tr><td class="lbl">Chargen-Nr.</td><td>${chargeLines}</td></tr>
      </table>
      <div class="weights">
        <div><div class="val">${fmtDE(data.b||0)}</div><div class="lbl">Brutto kg</div></div>
        <div><div class="val">${fmtDE(data.t||0)}</div><div class="lbl">Tara kg</div></div>
        <div><div class="val">${fmtDE(data.n||0)}</div><div class="lbl">Netto kg</div></div>
      </div>

      <div class="field">
        <label>Verladedatum</label>
        <input type="date" id="fVerladedatum" value="${todayISO()}">
      </div>
      <div class="field">
        <label>Kennzeichen</label>
        <input type="text" id="fKennzeichen" placeholder="z. B. SI-AB 123">
      </div>
      <div class="field">
        <label>Endpruefung durchgefuehrt</label>
        <div class="radiorow">
          <label><input type="radio" name="fEndpruefung" value="ja"> Ja</label>
          <label><input type="radio" name="fEndpruefung" value="nein"> Nein</label>
        </div>
      </div>
      <div class="field">
        <label>Bestaetigung Verlader (Kuerzel)</label>
        <canvas id="sigCanvas" class="sigcanvas"></canvas>
        <button type="button" class="sigclear no-print" id="btnClear">Loeschen</button>
      </div>

      <div class="error" id="errBox"></div>
      <div class="done" id="doneBox">Fertig. Im Druckdialog "Als PDF speichern" waehlen, danach die Datei ueber die Nextcloud App hochladen.</div>
      <button class="primary no-print" id="btnSubmit">Fertig &ndash; PDF erstellen</button>
    </div>`;

    const canvas=document.getElementById('sigCanvas');
    function sizeCanvas(){
      const rect=canvas.getBoundingClientRect();
      canvas.width=rect.width*2;
      canvas.height=rect.height*2;
      const ctx=canvas.getContext('2d');
      ctx.scale(2,2);
      ctx.lineWidth=2.2;ctx.lineCap='round';ctx.strokeStyle='#000';
    }
    sizeCanvas();
    canvas.dataset.signed='0';
    let drawing=false,last=null;
    function pos(e){
      const rect=canvas.getBoundingClientRect();
      const cx=(e.touches?e.touches[0].clientX:e.clientX);
      const cy=(e.touches?e.touches[0].clientY:e.clientY);
      return {x:cx-rect.left,y:cy-rect.top};
    }
    function start(e){drawing=true;last=pos(e);e.preventDefault();}
    function move(e){
      if(!drawing)return;
      const ctx=canvas.getContext('2d');
      const p=pos(e);
      ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();
      last=p;canvas.dataset.signed='1';e.preventDefault();
    }
    function end(){drawing=false;}
    canvas.addEventListener('mousedown',start);
    canvas.addEventListener('mousemove',move);
    window.addEventListener('mouseup',end);
    canvas.addEventListener('touchstart',start,{passive:false});
    canvas.addEventListener('touchmove',move,{passive:false});
    canvas.addEventListener('touchend',end);

    document.getElementById('btnClear').addEventListener('click',()=>{
      const ctx=canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      canvas.dataset.signed='0';
    });

    function buildPrintLayout(verladedatumISO,kennzeichen,endpruefungJa,sigDataUrl){
      const erstelltDatum=data.e||todayISO();
      const paletten=(data.p!=null)?data.p:'';
      return `
      <div class="ag-page">
        <div class="ag-header">
          <div class="ag-qm">Qualit&auml;tsmanagement<br>Handbuch<br><span class="ag-formular">Formular&nbsp;&nbsp;&nbsp;FO-07 &ndash; 06 Januar 2016</span><br>Ausgangsmeldung</div>
          <div><img class="ag-logo" src="data:image/jpeg;base64,${LOGO_B64}"></div>
        </div>
        <table class="ag-info">
          <tr><td class="ag-lbl">Kunde:</td><td class="ag-val ag-bold">${escHtml(data.k||'')}</td><td colspan="2">${data.l?'Lieferschein-Nr.: '+escHtml(data.l):''}</td></tr>
          <tr><td class="ag-lbl">Legierung:</td><td class="ag-val">${escHtml(data.m||'')}</td><td colspan="2">Bl&ouml;cke</td></tr>
          <tr><td class="ag-lbl">Chargen-Nr:</td><td class="ag-val" colspan="3">${chargeLines}</td></tr>
        </table>
        <table class="ag-weights">
          <tr><td>Brutto</td><td class="ag-num">${fmtDE(data.b||0)}</td><td>Kg</td><td>Paletten</td><td>${paletten}</td></tr>
          <tr><td>Tara</td><td class="ag-num">${fmtDE(data.t||0)}</td><td>Kg</td><td>Beh&auml;lter</td><td></td></tr>
          <tr><td>Netto</td><td class="ag-num">${fmtDE(data.n||0)}</td><td>Kg</td><td>Big Bags</td><td></td></tr>
          <tr><td></td><td></td><td></td><td>Gitterboxen</td><td></td></tr>
        </table>
        <div class="ag-fields">
          <div>Verladedatum: ${isoToDE(verladedatumISO)}</div>
          <div>Kennzeichen: ${escHtml(kennzeichen)}</div>
          <div>Endpr&uuml;fung durchgef&uuml;hrt: ${endpruefungJa?'\u2612 ja \u2610 Nein':'\u2610 ja \u2612 Nein'}</div>
          <div>Warenversand erfolgt</div>
          <div>Best&auml;tigung Verlader (K&uuml;rzel):<br><img class="ag-signimg" src="${sigDataUrl}"></div>
        </div>
        <div class="ag-footbox">
          <div>Datum: ${escHtml(erstelltDatum)}<br>Datei: FO-07-06</div>
          <div>Rev 01</div>
          <div>Seite: 1 von 1</div>
          <div>Freigabe: Skrandzuweit</div>
        </div>
      </div>`;
    }

    document.getElementById('btnSubmit').addEventListener('click',()=>{
      const datumEl=document.getElementById('fVerladedatum');
      const kennz=document.getElementById('fKennzeichen');
      const endpr=document.querySelector('input[name="fEndpruefung"]:checked');
      const errBox=document.getElementById('errBox');
      const missing=[];
      if(!datumEl.value)missing.push('Verladedatum');
      if(!kennz.value.trim())missing.push('Kennzeichen');
      if(!endpr)missing.push('Endpruefung ja/nein');
      if(canvas.dataset.signed!=='1')missing.push('Kuerzel');
      if(missing.length){
        errBox.textContent='Bitte ausfuellen: '+missing.join(', ');
        errBox.style.display='block';
        return;
      }
      errBox.style.display='none';
      document.getElementById('doneBox').style.display='block';
      const sigDataUrl=canvas.toDataURL('image/png');
      document.getElementById('printLayout').innerHTML=buildPrintLayout(datumEl.value,kennz.value.trim(),endpr.value==='ja',sigDataUrl);
      window.print();
    });
  }
}
</script>
</body>
</html>
